<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <form class="task-tracker-form">
        <div class="nav-color-div"></div>
        <h1 class="task-h1">Task Tracker</h1>
        <span id="down-icon" class="sort-down"></span>
        <div class="input-div">
            <span id="delete-icon"></span>
            <input class="text-input" type="text" required>
        </div>
        <div class="button-div">
            <input class="add-button" type="submit" value="+">
            <input class="add-task-button" type="button" value="Add">
        </div>
    </form>

    <script src="app.js"></script>
</body>

</html>
